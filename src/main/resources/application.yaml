spring:
  application:
    name: wordflow
  datasource:
    url: jdbc:h2:mem:wordflow
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      auto-commit: true
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        connection.autocommit: true
        connection.isolation: 2
        format_sql: true
  h2:
    console:
      enabled: true

wordflow:
  mode: multi
  threads: 2

app:
  security:
    username: admin
    password: admin
    role: ROLE_ADMIN

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG
